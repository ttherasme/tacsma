{% extends "base.html" %}

{% block title %}TACSMA - Analysis Results{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/result/results.css') }}" />
{% endblock %}

{% block content %}
<section class="page-content">
    <h1>Analysis Results</h1>
    <div id="dynamic-content"></div> 
</section>
<div id="manualAllocationModal" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="manualAllocationModalLabel">Manual Allocation Required</h5>
                <button type="button" class="btn-close" id="manualAllocationCloseBtn">✕</button>
            </div>
            <div class="modal-body">
                <div id="manualAllocationMessage" class="mb-3"></div>
                <div id="manualAllocationFields"></div>
                <div id="manualAllocationError" class="text-danger mt-3"></div>
            </div>
            <div class="modal-footer">
                <button type="button" id="saveManualAllocationBtn">Continue Analysis</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/result/results.js') }}"></script>
{% endblock %}
