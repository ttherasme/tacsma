{% extends "base.html" %}

{% block title %}TACSMA - Register Alias Unit of conversion{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auoc/auocregister.css') }}" />
{% endblock %}

{% block content %}
<section class="page-content">
    <h1>Register Alias Unit Of Conversion</h1>
    <div id="dynamic-content">
        <div class="dynamic-wrapper">
            <div class="form-header-top">
                <div></div>
                <div class="form-actions-top">
                    <button class="icon-button" id="add-row" type="button">➕</button>
                </div>
            </div>

            <div id="message-area" class="message-area"></div>

            <div class="form-box">
                <div class="form-header">
                    <div>Alias</div>
                    <div>Canonical Unit</div>
                    <div></div>
                    <div></div>
                </div>

                <div id="form-rows"></div>

                <div class="run-button-wrapper">
                    <button class="run-button" type="button">Register</button>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auoc/auocregister.js') }}"></script>
{% endblock %}
