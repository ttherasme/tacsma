{% extends "base.html" %}

{% block title %}TACSMA - Register element{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/element/elementregister_global.css') }}" />
{% endblock %}

{% block content %}
<section class="page-content">
    <h1>Register Element</h1>
    <div id="dynamic-content">
        <div class="dynamic-wrapper">
            <div class="form-header-top">
                <div></div>
                <div class="form-actions-top">
                    <button class="icon-button" id="add-row">➕</button>
                </div>
            </div>

            <div id="message-area" class="message-area"></div>

            <div class="form-box">
                <div class="form-header">
                    <div>Name</div>
                    <div>Type</div>
                    <div></div>
                    <div></div>
                </div>

                <div id="form-rows"></div>

                <div class="run-button-wrapper">
                    <button class="run-button">Register</button>
                    </div>
            </div>
            <script>
                window.itemOptions = `
                {% for item in items %}
                <option value="{{ item.IDI }}">{{ item.IName }}</option>
                {% endfor %}
                `;
            </script>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/element/elementregister_global.js') }}"></script>
{% endblock %}
