{% extends "base.html" %}

{% block title %}TACSMA - Data Sheet Register{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/datasheet/datasheetview.css') }}" />
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
{% endblock %}

{% block content %}
<section class="page-content">
  <h1>Data Sheet - View</h1>
  <div class="page-wrapper">
  <div class="top-tabs">
    <div class="tabs-left-controls">
      <input list="taskList" name="task" class="task-input" id="taskSelect" placeholder="Select or type a Task..." required>
      <datalist id="taskList"></datalist>
    </div>

    <div class="tabs-center">
      <button class="module-tab active" data-sname="Forest Operation">Forest Operation</button>
      <button class="module-tab" data-sname="Transportation">Transportation</button>
      <button class="module-tab" data-sname="Wood Processing">Wood Processing</button>
      <select class="module-tab" id="activeStepsSelect"></select>
    </div>
  </div>

  <div class="main-layout">
    <div class="left-panel" id="categoryPanel">
      <button class="category selected" data-category="Product">+ Product</button>
      <button class="category" data-category="Co-Products">+ Co-Products</button>
      <button class="category" data-category="Input Materials and Energy">+ Input Materials and Energy</button>
      <button class="category" data-category="Emissions">+ Emissions</button>
      <button class="category" data-category="Waste Treatment">+ Waste Treatment</button>
    </div>

    <div class="right-panel" id="rightPanel">
      <!-- Form will load here dynamically -->
    </div>
  </div>
</div>
</section>

{% endblock %}

{% block scripts %}
<script>
    const initialTaskId = {{ task_id|tojson }};
    const initialTaskName = {{ task_name|tojson }};
</script>
<script src="{{ url_for('static', filename='js/datasheet/datasheetview.js') }}"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="{{ url_for('static', filename='js/datasheet/elementmodal.js') }}"></script>
{% endblock %}
